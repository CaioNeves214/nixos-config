[General]
# Diretório com os artefatos gerados pelo update-theme (wallpaper, blur, avatar,
# colors.conf). Precisa ser legível pelo usuário sddm — ver modules/system/login.nix.
dataDir=/var/lib/sddm-theme

# Duração (ms) do fade de entrada e do fade+desborrão ao logar.
animationDuration=700

font=JetBrainsMono Nerd Font
