# =========================
# MONITORS
# =========================
monitor=,preferred,auto,1

# =========================
# COLORS (design system — gerado por wallust)
# =========================
source = ~/.config/hypr/colors.conf

# =========================
# PROGRAMS
# =========================
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -show-icons

# =========================
# AUTOSTART
# =========================
exec-once = waybar
exec-once = hyprpaper

# =========================
# INPUT
# =========================
input {
    kb_layout = br
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0
}

input {
    touchpad {
        clickfinger_behavior = true
        natural_scroll = true
        tap-to-click = true
        scroll_factor = 0.5
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 10
    workspace_swipe_cancel_ratio = 0.15
}

# =========================
# GENERAL
# =========================
general {
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    col.active_border = $primary
    col.inactive_border = $base

    resize_on_border = false
}

# =========================
# DECORATION
# =========================
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

# =========================
# ANIMATIONS
# =========================
animations {
    enabled = true

    bezier = workspaceBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 4, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 7, default, slidefade
    animation = workspacesIn, 1, 7, default, slidefade
    animation = workspacesOut, 1, 7, default, slidefade
}

# =========================
# LAYOUT
# =========================
dwindle {
    preserve_split = true
}

# =========================
# KEYBINDS
# =========================
bind = SUPER, Return, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER, D, exec, $menu
bind = SUPER, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = SUPER, Q, exec, $terminal

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

bind = SUPER, C, killactive
bind = SUPER, F, fullscreen

bind = SUPER, left, movefocus, l
bind = SUPER, down, movefocus, d
bind = SUPER, up, movefocus, u
bind = SUPER, right, movefocus, r

bind = SUPER SHIFT, left, movetoworkspace, r-1
bind = SUPER SHIFT, right, movetoworkspace, r+1

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# =========================
# WINDOW RULES
# =========================

# Volume popup (waybar pulseaudio on-click)
# Positioned just below the waybar: margin-top(8) + height(42) + gap(8) = 58px from top
# 72% from left places it near the right-side modules
windowrulev2 = float, class:waybar-volume-popup
windowrulev2 = move 72% 58, class:waybar-volume-popup
windowrulev2 = size 290 70, class:waybar-volume-popup
windowrulev2 = noborder, class:waybar-volume-popup
windowrulev2 = pin, class:waybar-volume-popup
