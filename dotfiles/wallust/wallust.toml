# Design System — fonte única de cores derivadas do wallpaper.
#
# wallust extrai as cores dominantes da imagem e renderiza os 3 templates abaixo,
# escrevendo um include de cor em cada app. Os apps fazem source/import desse include.
# Trocar a paleta inteira = trocar o wallpaper e rodar `update-theme`.

# Backend de extração (resized = bom equilíbrio precisão/velocidade).
backend = "resized"

# Espaço de cor para selecionar as cores mais prominentes.
color_space = "lch"

# Esquema: 8 cores escuras, fundo escuro e contraste claro.
palette = "dark"

# Garante contraste legível em relação ao fundo (evita texto ilegível).
check_contrast = true

# Mapeamento template -> destino.
# 'template' é relativo a ~/.config/wallust/templates/ ; 'target' é caminho absoluto.
[templates]
kitty  = { template = 'colors-kitty.conf', target = '~/.config/kitty/colors.conf' }
hypr   = { template = 'colors-hypr.conf',  target = '~/.config/hypr/colors.conf' }
waybar = { template = 'colors-waybar.css', target = '~/.config/waybar/colors.css' }
rofi  = { template = 'colors-rofi.rasi',  target = '~/.config/rofi/colors.rasi' }

# Tela de login (SDDM). O greeter roda como o usuário 'sddm' e não lê ~/.config,
# então o update-theme copia este arquivo para /var/lib/sddm-theme/colors.conf
# (diretório criado por modules/system/login.nix).
sddm  = { template = 'colors-sddm.conf', target = '~/.cache/sddm-colors.conf' }

# Layout da waybar com as cores do calendário derivadas da paleta (Pango markup
# não faz @import, então o config inteiro passa pelo wallust). target NÃO é
# symlinkado pelo Home Manager — é um arquivo real gerado aqui.
waybar_cfg = { template = 'waybar-config.jsonc', target = '~/.config/waybar/config.jsonc' }

# Widget de mídia (Quickshell): não tem @import, lê este JSON em runtime via
# FileView (watchChanges), então re-tematiza ao vivo a cada update-theme.
quickshell = { template = 'colors-quickshell.json', target = '~/.config/quickshell/colors.json' }
